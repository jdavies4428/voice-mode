<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefe — Voice Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* --- Header --- */
  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1a1a1a;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333;
    transition: background 0.6s ease, box-shadow 0.6s ease;
    flex-shrink: 0;
  }
  .status-dot.listening { background: #2d6a2d; box-shadow: 0 0 4px #2d6a2d; }
  .status-dot.working   { background: #ff3300; box-shadow: 0 0 6px #ff3300; animation: dot-pulse 1.2s ease-in-out infinite; }
  .status-dot.speaking  { background: #cc8800; box-shadow: 0 0 4px #cc8800; }
  .status-dot.recording  { background: #5577ff; box-shadow: 0 0 6px #5577ff; animation: dot-pulse 1s ease-in-out infinite; }
  .status-dot.reconnecting { background: #cc8800; animation: dot-pulse 2s ease-in-out infinite; }
  @keyframes dot-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  header .title {
    font-size: 13px; font-weight: 600; color: #888;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .header-spacer { flex: 1; }
  .model-badge {
    font-size: 11px;
    font-weight: 500;
    color: #555;
    background: #141414;
    border: 1px solid #1e1e1e;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.03em;
    transition: color 0.4s, border-color 0.4s;
    white-space: nowrap;
  }
  .model-badge.active { color: #888; border-color: #333; }

  /* --- Claw section --- */
  .claw-section {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 24px;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  /* Ambient glow behind the lobster */
  .claw-glow {
    position: absolute;
    width: 450px; height: 450px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,40,0,0) 0%, rgba(255,40,0,0) 100%);
    pointer-events: none;
    transition: background 1s ease;
  }
  .claw-glow.working {
    background: radial-gradient(circle, rgba(255,40,0,0.12) 0%, rgba(255,40,0,0) 70%);
  }
  .claw-glow.speaking {
    background: radial-gradient(circle, rgba(204,136,0,0.08) 0%, rgba(204,136,0,0) 70%);
  }
  .claw-glow.listening {
    background: radial-gradient(circle, rgba(45,106,45,0.04) 0%, rgba(45,106,45,0) 70%);
  }
  .claw-glow.recording {
    background: radial-gradient(circle, rgba(85,119,255,0.15) 0%, rgba(85,119,255,0) 70%);
  }
  .claw-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .claw {
    font-size: 180px;
    line-height: 1;
    filter: saturate(0.3) brightness(0.6);
    transition: filter 0.6s ease, transform 0.4s ease;
    cursor: pointer;
  }
  .claw.listening {
    filter: saturate(0.5) brightness(0.8);
    animation: breathe 4s ease-in-out infinite;
  }
  .claw.recording {
    filter: saturate(1.0) brightness(1.2) drop-shadow(0 0 25px rgba(85,119,255,0.7));
    animation: record-pulse 0.6s ease-in-out infinite;
  }
  .claw.working {
    filter: saturate(1.5) brightness(1.3) drop-shadow(0 0 30px rgba(255,40,0,0.8));
    animation: pulse 1.2s ease-in-out infinite;
  }
  .claw.speaking {
    filter: saturate(1.2) brightness(1.1) drop-shadow(0 0 20px rgba(204,136,0,0.6));
    animation: speak-pulse 0.8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%   { transform: scale(1.00); }
    50%  { transform: scale(1.015); }
    100% { transform: scale(1.00); }
  }
  @keyframes pulse {
    0%   { transform: scale(1.00); filter: saturate(1.5) brightness(1.2) drop-shadow(0 0 20px rgba(255,40,0,0.7)); }
    50%  { transform: scale(1.08); filter: saturate(2.0) brightness(1.5) drop-shadow(0 0 50px rgba(255,40,0,1.0)); }
    100% { transform: scale(1.00); filter: saturate(1.5) brightness(1.2) drop-shadow(0 0 20px rgba(255,40,0,0.7)); }
  }
  @keyframes speak-pulse {
    0%   { transform: scale(1.00); }
    50%  { transform: scale(1.03); }
    100% { transform: scale(1.00); }
  }
  @keyframes record-pulse {
    0%   { transform: scale(1.00); filter: saturate(1.0) brightness(1.1) drop-shadow(0 0 20px rgba(85,119,255,0.6)); }
    50%  { transform: scale(1.05); filter: saturate(1.3) brightness(1.3) drop-shadow(0 0 40px rgba(85,119,255,0.9)); }
    100% { transform: scale(1.00); filter: saturate(1.0) brightness(1.1) drop-shadow(0 0 20px rgba(85,119,255,0.6)); }
  }

  /* Speaking progress bar */
  .progress-wrap {
    width: 80px; height: 2px;
    background: #1a1a1a;
    border-radius: 1px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-fill {
    height: 100%;
    background: #cc8800;
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .status-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #333;
    transition: color 0.6s ease;
    min-height: 16px;
  }
  .status-label.listening { color: #2d6a2d; }
  .status-label.working   { color: #ff3300; }
  .status-label.speaking  { color: #cc8800; }
  .status-label.recording { color: #5577ff; }

  /* Live transcript */
  .transcript {
    font-size: 14px;
    color: #888;
    text-align: center;
    max-width: 300px;
    min-height: 20px;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .transcript.visible { opacity: 1; }

  /* User messages */
  .message.user {
    background: #1a1a2a;
    color: #aab;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    user-select: text;
    -webkit-user-select: text;
  }
  .message.user .speaker { color: #5577ff; }

  /* Audio gate overlay */
  .audio-gate {
    position: absolute;
    inset: 0;
    background: rgba(8,8,8,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.4s ease;
  }
  .audio-gate.hidden { opacity: 0; pointer-events: none; }
  .audio-gate .gate-icon { font-size: 72px; filter: saturate(0.4) brightness(0.8); }
  .audio-gate .gate-text {
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #555;
  }

  /* --- Divider --- */
  .divider { height: 1px; background: #141414; margin: 0 24px; }

  /* --- Conversation (newest at bottom, auto-scroll) --- */
  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .conversation::-webkit-scrollbar { width: 3px; }
  .conversation::-webkit-scrollbar-track { background: transparent; }
  .conversation::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
  .message {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.55;
    animation: fadeIn 0.3s ease;
    position: relative;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message.assistant {
    background: #111;
    color: #ccc;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    user-select: text;
    -webkit-user-select: text;
  }
  .message .speaker {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #cc2200;
    margin-bottom: 4px;
  }
  /* Hover metadata */
  .message .msg-meta {
    display: none;
    font-size: 10px;
    color: #444;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .message:hover .msg-meta { display: block; }
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1a1a;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* --- Footer --- */
  footer {
    padding: 8px 24px;
    border-top: 1px solid #111;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }
  .cost-ticker {
    font-size: 10px;
    font-weight: 500;
    color: #333;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .cost-ticker.active { color: #555; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <div class="title">Jefe — Voice Mode</div>
  <div class="header-spacer"></div>
  <div class="model-badge" id="modelBadge">—</div>
</header>

<div class="claw-section">
  <div class="claw-glow" id="clawGlow"></div>
  <div class="claw-wrap">
    <div class="claw" id="claw">🦞</div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="status-label" id="statusLabel">Connecting...</div>
  <div class="transcript" id="transcript"></div>
  <div class="audio-gate" id="audioGate">
    <div class="gate-icon">🦞</div>
    <div class="gate-text">Click to enable voice</div>
  </div>
</div>

<div class="divider"></div>

<div class="conversation" id="conversation">
  <div class="empty-state" id="emptyState">Waiting for messages</div>
</div>

<footer>
  <div class="cost-ticker" id="costTicker"></div>
</footer>

<script>
const $ = id => document.getElementById(id);
const claw = $('claw');
const statusLabel = $('statusLabel');
const statusDot = $('statusDot');
const clawGlow = $('clawGlow');
const conversation = $('conversation');
const emptyState = $('emptyState');
const audioGate = $('audioGate');
const modelBadge = $('modelBadge');
const progressWrap = $('progressWrap');
const progressFill = $('progressFill');
const costTicker = $('costTicker');

let seenMessages = new Set();
let sessionCost = 0;

// --- Clean OpenClaw directives ---
function cleanText(text) {
  return text.replace(/\[\[[^\]]*\]\]\s*/g, '').trim();
}

// --- Audio context ---
let audioCtx = null;
let audioInitialized = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

async function initAudio() {
  if (audioInitialized) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  if (ctx.state === 'running') {
    audioInitialized = true;
    audioGate.classList.add('hidden');
  }
}

audioGate.addEventListener('click', (e) => { e.stopPropagation(); initAudio(); });
document.body.addEventListener('click', initAudio);

// --- State machine ---
let currentState = 'connecting';

function setState(state) {
  currentState = state;
  const css = state === 'idle' ? 'listening' : state;
  claw.className = `claw ${css}`;
  statusDot.className = `status-dot ${css}`;
  statusLabel.className = `status-label ${css}`;
  clawGlow.className = `claw-glow ${css}`;
  statusLabel.textContent = ({
    idle: 'Listening...', working: 'Thinking...',
    speaking: 'Speaking...', connecting: 'Connecting...',
    recording: 'Recording...'
  })[state] || state;

  // Progress bar visibility
  if (state !== 'speaking') {
    progressWrap.classList.remove('visible');
    progressFill.style.width = '0%';
  }

  // Show gate if audio not enabled
  if (!audioInitialized && (state === 'speaking' || state === 'idle')) {
    audioGate.classList.remove('hidden');
  }
}

// --- Progress ---
function setProgress(current, total) {
  if (total <= 1) {
    progressWrap.classList.remove('visible');
    return;
  }
  progressWrap.classList.add('visible');
  progressFill.style.width = `${Math.round((current / total) * 100)}%`;
}

// --- Sentence splitting ---
function splitSentences(text) {
  let clean = text
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`[^`]+`/g, '')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\*{1,3}([^*]+)\*{1,3}/g, '$1')
    .replace(/_{1,2}([^_]+)_{1,2}/g, '$1')
    .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
    .replace(/^\s*[-*•]\s+/gm, '')
    .replace(/^\s*\d+\.\s+/gm, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  let parts = clean.split(/(?<=[.!?])\s+/);
  return parts.map(s => s.trim()).filter(s => s.length > 0);
}

// --- TTS ---
let speakAbort = null;

async function fetchTTSAudio(text) {
  const resp = await fetch('/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  if (!resp.ok) throw new Error(`TTS ${resp.status}`);
  return await resp.arrayBuffer();
}

function playAudioBuffer(buffer) {
  return new Promise(async (resolve) => {
    try {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') await ctx.resume();
      if (ctx.state !== 'running') {
        audioGate.classList.remove('hidden');
        resolve();
        return;
      }
      const audioBuffer = await ctx.decodeAudioData(buffer);
      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(ctx.destination);
      source.onended = resolve;
      source.onerror = resolve;
      source.start(0);
      setTimeout(resolve, (audioBuffer.duration + 2) * 1000);
    } catch (e) {
      resolve();
    }
  });
}

async function speakWithKokoro(text) {
  if (!text || text === 'NO_REPLY' || text === 'HEARTBEAT_OK') {
    setState('idle');
    return;
  }
  await initAudio();
  const abortId = Symbol();
  speakAbort = abortId;
  const sentences = splitSentences(text);
  if (sentences.length === 0) { setState('idle'); return; }

  setState('speaking');
  let nextFetch = null;

  for (let i = 0; i < sentences.length; i++) {
    if (speakAbort !== abortId) return;
    setProgress(i + 1, sentences.length);

    const sentence = sentences[i];
    const truncated = sentence.length > 500 ? sentence.slice(0, 500) + '...' : sentence;

    let audioData;
    try {
      audioData = nextFetch ? await nextFetch : await fetchTTSAudio(truncated);
    } catch (e) {
      await fallbackSpeak(truncated);
      nextFetch = null;
      continue;
    }

    if (i + 1 < sentences.length) {
      const next = sentences[i + 1];
      nextFetch = fetchTTSAudio(next.length > 500 ? next.slice(0, 500) + '...' : next);
    } else {
      nextFetch = null;
    }

    if (speakAbort !== abortId) return;
    try { await playAudioBuffer(audioData); } catch (e) {}
  }

  if (speakAbort === abortId) setState('idle');
}

function fallbackSpeak(text) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// --- Messages (newest at bottom, auto-scroll) ---
function scrollToBottom() {
  conversation.scrollTop = conversation.scrollHeight;
}

function addMessage(text, meta) {
  if (seenMessages.has(text)) return;
  seenMessages.add(text);
  if (emptyState && emptyState.parentNode) emptyState.remove();

  const div = document.createElement('div');
  div.className = 'message assistant';

  let metaHtml = '';
  if (meta) {
    const parts = [];
    if (meta.model) parts.push(meta.model);
    if (meta.tokens) parts.push(`${meta.tokens} tok`);
    if (meta.cost) parts.push(`$${meta.cost.toFixed(4)}`);
    const now = new Date();
    parts.push(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    metaHtml = `<div class="msg-meta">${parts.join(' · ')}</div>`;
  }

  div.innerHTML = `<div class="speaker">Jefe</div><div>${text.replace(/\n/g,'<br>')}</div>${metaHtml}`;
  conversation.appendChild(div);
  scrollToBottom();
}

// --- Cost ticker ---
function updateCost(cost) {
  sessionCost = cost;
  if (cost > 0) {
    costTicker.textContent = `$${cost.toFixed(4)} this session`;
    costTicker.classList.add('active');
  }
}

// --- Voice input (Speech Recognition) ---
const transcript = $('transcript');
let recognition = null;
let isRecording = false;
let finalTranscript = '';

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function startRecording() {
  if (!SpeechRecognition) { console.warn('[voice] SpeechRecognition not supported'); return; }
  if (isRecording) { stopRecording(); return; }

  // Interrupt any current speech
  if (currentState === 'speaking') {
    speakAbort = null;
    if (audioCtx) { audioCtx.close(); audioCtx = null; audioInitialized = false; }
  }

  initAudio();
  isRecording = true;
  finalTranscript = '';
  transcript.textContent = '';
  transcript.classList.add('visible');
  setState('recording');

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    transcript.textContent = finalTranscript + interim;
  };

  recognition.onerror = (e) => {
    console.error('[voice] Recognition error:', e.error);
    if (e.error !== 'no-speech') stopRecording();
  };

  recognition.onend = () => {
    // Auto-send if we have text and recording was stopped
    if (!isRecording && finalTranscript.trim()) {
      sendVoiceMessage(finalTranscript.trim());
    }
    if (isRecording) {
      // Restarted by browser timeout — keep going
      try { recognition.start(); } catch(e) {}
    }
  };

  try { recognition.start(); } catch(e) {}
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  // If we have a final transcript, send immediately
  // (onend handler will also fire, but we handle it here for responsiveness)
  const text = (finalTranscript + '').trim() || transcript.textContent.trim();
  transcript.classList.remove('visible');
  if (text) {
    sendVoiceMessage(text);
  } else {
    setState('idle');
  }
}

async function sendVoiceMessage(text) {
  // Show user message in conversation
  addUserMessage(text);
  setState('working');
  transcript.textContent = '';
  transcript.classList.remove('visible');

  try {
    const resp = await fetch('/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      console.error('[voice] Send error:', err);
    }
    // SSE will pick up the response — no need to handle it here
  } catch (e) {
    console.error('[voice] Send failed:', e);
    setState('idle');
  }
}

function addUserMessage(text) {
  if (emptyState && emptyState.parentNode) emptyState.remove();
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="speaker">You</div><div>${text.replace(/\n/g,'<br>')}</div>`;
  conversation.appendChild(div);
  scrollToBottom();
}

// Lobster click = toggle recording
claw.addEventListener('click', (e) => {
  e.stopPropagation();
  if (currentState === 'recording') {
    stopRecording();
  } else if (currentState === 'idle' || currentState === 'working') {
    startRecording();
  }
});

// --- SSE ---
function connect() {
  setState('connecting');
  const es = new EventSource('/events');

  es.onopen = () => setState('idle');

  es.onmessage = async (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'meta') {
      if (msg.model && msg.model !== 'unknown') {
        modelBadge.textContent = msg.model;
        modelBadge.classList.add('active');
      }
      if (msg.cost) updateCost(msg.cost);
      return;
    }

    if (msg.type === 'working') {
      if (currentState === 'speaking') {
        speakAbort = null;
        if (audioCtx) { audioCtx.close(); audioCtx = null; audioInitialized = false; }
      }
      setState('working');
    } else if (msg.type === 'done' && msg.text) {
      const text = cleanText(msg.text);
      const meta = { model: msg.model, tokens: msg.tokens, cost: msg.cost };
      addMessage(text, meta);
      if (msg.sessionCost) updateCost(msg.sessionCost);
      try {
        await speakWithKokoro(text);
      } catch (e) {
        setState('idle');
      }
    } else if (msg.type === 'idle') {
      if (currentState !== 'speaking') setState('idle');
    }
  };

  es.onerror = () => {
    statusDot.className = 'status-dot reconnecting';
    es.close();
    setTimeout(connect, 3000);
  };
}

connect();

// Auto-unlock audio
(async () => {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    if (ctx.state === 'running') {
      audioInitialized = true;
      audioGate.classList.add('hidden');
    }
  } catch(e) {}
})();

// Scroll to bottom on load
scrollToBottom();
</script>
</body>
</html>
